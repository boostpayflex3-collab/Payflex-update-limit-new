<!-- PREMIUM LOADING ANIMATION -->
<div class="loader-wrapper" id="loader">

  <div class="bg-glow"></div>

  <div class="loader-box">

    <div class="logo-loader">
      P
    </div>

    <div class="loader-title">
      PayFlex Help Center
    </div>

    <div class="loader-sub">
      Connecting to secure support service...
    </div>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

  </div>

</div>

<style>

.loader-wrapper{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#0f0f0f,#1b0000,#120000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  overflow:hidden;
}

.bg-glow{
  position:absolute;
  width:450px;
  height:450px;
  background:red;
  opacity:.12;
  border-radius:50%;
  filter:blur(180px);
  animation:floatGlow 8s ease-in-out infinite;
}

.loader-box{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo-loader{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:28px;
  background:linear-gradient(145deg,#ff1a1a,#9e0000);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:42px;
  font-weight:bold;

  box-shadow:
  0 0 30px rgba(255,0,0,0.4),
  0 0 70px rgba(255,0,0,0.15);

  animation:pulseLogo 2s infinite;
}

.loader-title{
  margin-top:28px;
  color:white;
  font-size:24px;
  font-weight:700;
  letter-spacing:.5px;
}

.loader-sub{
  margin-top:12px;
  color:#9f9f9f;
  font-size:14px;
}

.progress-bar{
  width:260px;
  height:7px;
  margin-top:32px;
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  overflow:hidden;
  margin-left:auto;
  margin-right:auto;
}

.progress-fill{
  width:0%;
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,#ff1a1a,#ff5c5c);
  box-shadow:0 0 20px rgba(255,0,0,0.5);
  animation:loading 4s forwards;
}

/* ANIMATION */

@keyframes loading{
  from{
    width:0%;
  }
  to{
    width:100%;
  }
}

@keyframes pulseLogo{
  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }
}

@keyframes floatGlow{

  0%{
    transform:translate(-100px,-50px);
  }

  50%{
    transform:translate(100px,50px);
  }

  100%{
    transform:translate(-100px,-50px);
  }

}

</style>

<script>

setTimeout(() => {

  document.getElementById("loader").style.opacity = "0";

  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  },500);

},4000);

</script>
